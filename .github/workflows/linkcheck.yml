name: Check for broken links

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    # https://crontab.guru/#00_18_*_*_1
    - cron: "00 18 * * 1"
  pull_request:

permissions:
  issues: write

jobs:
  linkcheck-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          # This should be the same version that we use in .netlify.toml
          hugo-version: '0.125.3'
          extended: true

      - name: Build
        run: hugo --minify

      # Intentionally skips (req for full deploy parity) to keep
      # PR checks fast and network-light.
      - name: Generate blog post redirects
        run: python scripts/generate-blog-aliases.py

      - name: Link Checker (internal, offline)
        uses: lycheeverse/lychee-action@v2.7.0
        with:
          args: --offline --no-progress --root-dir "${{ github.workspace }}/public" public/**/*.html

  linkcheck-scheduled:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.125.3'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Generate blog post redirects
        run: python scripts/generate-blog-aliases.py

      - name: Link Checker (external)
        uses: lycheeverse/lychee-action@v2.7.0
        with:
          args: --verbose --no-progress --root-dir "${{ github.workspace }}/public" public/**/*.html
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Create Issue From File
        if: env.lychee_exit_code != 0
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: report, automated issue
